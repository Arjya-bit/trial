version: '3.8'

services:
  # Backend API
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ultimate_ot_afp
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - DEBUG=true
    depends_on:
      - postgres
      - redis
      - elasticsearch
    volumes:
      - ./backend:/app
      - ./evidence:/app/evidence
      - ./models:/app/models
    networks:
      - ot-afp-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ot-afp-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ultimate_ot_afp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - ot-afp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ot-afp-network

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ot-afp-network

  # Kibana (Optional - for Elasticsearch visualization)
  kibana:
    image: kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - ot-afp-network

  # C2 Server (Separate service for isolation)
  c2-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.c2
    ports:
      - "8443:8443"
    environment:
      - C2_PORT=8443
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ultimate_ot_afp
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./c2_certs:/app/certs
    networks:
      - ot-afp-network

  # Autonomous Agent (Background service)
  autonomous-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.autonomous
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ultimate_ot_afp
      - REDIS_URL=redis://redis:6379
      - STEALTH_MODE=true
      - AUTO_EXECUTION=true
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./evidence:/app/evidence
      - ./models:/app/models
    networks:
      - ot-afp-network

  # Network Monitor (Traffic Analysis)
  network-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile.network
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CAPTURE_INTERFACE=eth0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/ultimate_ot_afp
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    privileged: true

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  ot-afp-network:
    driver: bridge